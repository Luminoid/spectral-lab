<body>

  <h1><span>Spectral</span> Lab</h1>
  <div class="header-links">

<div class="tabs">
  <button class="tab-btn active" data-tab="prism">棱镜折射</button>
  <button class="tab-btn" data-tab="waveform">脉冲轮廓</button>
  <button class="tab-btn" data-tab="lensing">引力透镜</button>
  <button class="tab-btn" data-tab="nebula">星云</button>
  <button class="tab-btn" data-tab="topographic">等高线</button>
  <button class="tab-btn" data-tab="moire">莫尔条纹</button>
</div>

<!-- ============ PRISM GENERATOR ============ -->
<div class="generator active" id="gen-prism">
  <div class="controls">
    <!-- 材质与光线 -->
    <div class="control-group">
      <label>玻璃类型</label>
      <select id="p-glass">
        <option value="silica">熔融石英 (n 1.45-1.47)</option>
        <option value="bk7" selected>BK7 硼硅酸盐 (n 1.51-1.54)</option>
        <option value="flint">重火石 SF11 (n 1.74-1.81)</option>
        <option value="diamond">钻石 (n 2.41-2.45)</option>
      </select>
    </div>
    <div class="control-group">
      <label>入射角 <span class="value" id="v-p-incidentAngle">49</span>&deg;</label>
      <input type="range" id="p-incidentAngle" min="10" max="85" value="49" step="1">
    </div>
    <div class="control-group">
      <label>光谱带数</label>
      <select id="p-bandCount">
        <option value="6">6 (红橙黄绿蓝紫)</option>
        <option value="7" selected>7 (红橙黄绿蓝靛紫)</option>
        <option value="13">13 (精细)</option>
        <option value="25">25 (连续)</option>
      </select>
    </div>
    <div class="control-group">
      <label>色散倍率 <span class="value" id="v-p-spread">8</span>x</label>
      <input type="range" id="p-spread" min="1" max="30" value="8" step="1">
    </div>
    <div class="control-group">
      <label>光束宽度 <span class="value" id="v-p-beamWidth">22</span></label>
      <input type="range" id="p-beamWidth" min="5" max="50" value="22" step="1">
    </div>
    <!-- 棱镜几何 -->
    <div class="control-group">
      <label>棱镜角度 <span class="value" id="v-p-prismAngle">60</span>&deg;</label>
      <input type="range" id="p-prismAngle" min="30" max="120" value="60" step="1">
    </div>
    <div class="control-group">
      <label>棱镜大小 <span class="value" id="v-p-prismScale">32</span>%</label>
      <input type="range" id="p-prismScale" min="15" max="50" value="32" step="1">
    </div>
    <div class="control-group">
      <label>旋转 <span class="value" id="v-p-rotation">0</span>&deg;</label>
      <input type="range" id="p-rotation" min="-180" max="180" value="0" step="1">
    </div>
    <!-- 视觉 -->
    <div class="control-group">
      <label>辉光范围 <span class="value" id="v-p-glowSpan">1.0</span>x</label>
      <input type="range" id="p-glowSpan" min="1.0" max="6.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="p-stars" checked> 星空背景
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="p-bloom" checked> 泛光
      </label>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="prism-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="prism-info"></div>
    <div class="btn-row">
      <button class="btn" id="prism-download">下载 PNG</button>
      <button class="btn secondary" id="prism-download-hd">下载 4K</button>
    </div>
  </div>
</div>

<!-- ============ WAVEFORM GENERATOR ============ -->
<div class="generator" id="gen-waveform">
  <div class="controls">
    <div class="control-group">
      <label>线条数 <span class="value" id="v-w-lineCount">60</span></label>
      <input type="range" id="w-lineCount" min="10" max="120" value="60" step="1">
    </div>
    <div class="control-group">
      <label>振幅 <span class="value" id="v-w-amplitude">1.0</span></label>
      <input type="range" id="w-amplitude" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
      <label>噪声 <span class="value" id="v-w-noise">0.3</span></label>
      <input type="range" id="w-noise" min="0" max="1.0" value="0.3" step="0.05">
    </div>
    <div class="control-group">
      <label>波峰数 <span class="value" id="v-w-peakCount">3</span></label>
      <input type="range" id="w-peakCount" min="1" max="8" value="3" step="1">
    </div>
    <div class="control-group">
      <label>波峰宽度 <span class="value" id="v-w-peakWidth">0.05</span></label>
      <input type="range" id="w-peakWidth" min="0.01" max="0.20" value="0.05" step="0.01">
    </div>
    <div class="control-group">
      <label>中心集中度 <span class="value" id="v-w-centerBias">0.6</span></label>
      <input type="range" id="w-centerBias" min="0.1" max="1.0" value="0.6" step="0.05">
    </div>
    <div class="control-group">
      <label>线宽 <span class="value" id="v-w-lineWidth">1.5</span></label>
      <input type="range" id="w-lineWidth" min="0.5" max="4.0" value="1.5" step="0.5">
    </div>
    <div class="control-group">
      <label>线条颜色
        <input type="color" id="w-strokeColor" value="#ffffff">
      </label>
    </div>
    <div class="control-group">
      <label>背景色
        <input type="color" id="w-bgColor" value="#000000">
      </label>
    </div>
    <div class="control-group">
      <label>种子 <span class="value" id="v-w-seed">1979</span></label>
      <input type="range" id="w-seed" min="1" max="9999" value="1979" step="1">
    </div>
    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="w-fillBelow" checked> 山形填充
      </label>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="waveform-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="waveform-info"></div>
    <div class="btn-row">
      <button class="btn" id="waveform-download">下载 PNG</button>
      <button class="btn secondary" id="waveform-download-hd">下载 4K</button>
      <button class="btn secondary" id="waveform-randomize">随机</button>
    </div>
  </div>
</div>

<!-- ============ GRAVITATIONAL LENSING GENERATOR ============ -->
<div class="generator" id="gen-lensing">
  <div class="controls">
    <div class="control-group">
      <label>质量 <span class="value" id="v-l-mass">80</span></label>
      <input type="range" id="l-mass" min="10" max="100" value="80" step="1">
    </div>
    <div class="control-group">
      <label>光源 X <span class="value" id="v-l-sourceX">30</span></label>
      <input type="range" id="l-sourceX" min="-300" max="300" value="30" step="5">
    </div>
    <div class="control-group">
      <label>光源 Y <span class="value" id="v-l-sourceY">-20</span></label>
      <input type="range" id="l-sourceY" min="-300" max="300" value="-20" step="5">
    </div>
    <div class="control-group">
      <label>光源大小 <span class="value" id="v-l-sourceSize">30</span></label>
      <input type="range" id="l-sourceSize" min="5" max="80" value="30" step="1">
    </div>
    <div class="control-group">
      <label>爱因斯坦半径 <span class="value" id="v-l-einsteinRadius">200</span></label>
      <input type="range" id="l-einsteinRadius" min="50" max="500" value="200" step="10">
    </div>
    <div class="control-group">
      <label>环亮度 <span class="value" id="v-l-ringBrightness">80</span>%</label>
      <input type="range" id="l-ringBrightness" min="10" max="100" value="80" step="5">
    </div>
    <div class="control-group">
      <label>形变 <span class="value" id="v-l-distortion">1.0</span></label>
      <input type="range" id="l-distortion" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
      <label>色相偏移 <span class="value" id="v-l-colorShift">0</span>&deg;</label>
      <input type="range" id="l-colorShift" min="0" max="360" value="0" step="5">
    </div>
    <div class="control-group">
      <label>星星 <span class="value" id="v-l-starCount">300</span></label>
      <input type="range" id="l-starCount" min="50" max="800" value="300" step="10">
    </div>
    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="l-showGrid"> 形变网格
      </label>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="lensing-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="lensing-info"></div>
    <div class="btn-row">
      <button class="btn" id="lensing-download">下载 PNG</button>
      <button class="btn secondary" id="lensing-download-hd">下载 4K</button>
    </div>
  </div>
</div>

<!-- ============ NEBULA GENERATOR ============ -->
<div class="generator" id="gen-nebula">
  <div class="controls">
    <div class="control-group">
      <label>配色</label>
      <select id="n-palette">
        <option value="emission">发射星云（真彩色）</option>
        <option value="hubble">哈勃 SHO</option>
        <option value="reflection">反射星云</option>
        <option value="planetary">行星状星云</option>
      </select>
    </div>
    <div class="control-group">
      <label>比例 <span class="value" id="v-n-scale">3.0</span></label>
      <input type="range" id="n-scale" min="1.0" max="8.0" value="3.0" step="0.5">
    </div>
    <div class="control-group">
      <label>密度 <span class="value" id="v-n-density">60</span>%</label>
      <input type="range" id="n-density" min="10" max="100" value="60" step="5">
    </div>
    <div class="control-group">
      <label>湍流 <span class="value" id="v-n-turbulence">6</span></label>
      <input type="range" id="n-turbulence" min="2" max="8" value="6" step="1">
    </div>
    <div class="control-group">
      <label>星星 <span class="value" id="v-n-starCount">500</span></label>
      <input type="range" id="n-starCount" min="50" max="1500" value="500" step="50">
    </div>
    <div class="control-group">
      <label>星光亮度 <span class="value" id="v-n-starBrightness">80</span>%</label>
      <input type="range" id="n-starBrightness" min="10" max="100" value="80" step="5">
    </div>
    <div class="control-group">
      <label>色相偏移 <span class="value" id="v-n-hueShift">0</span>&deg;</label>
      <input type="range" id="n-hueShift" min="0" max="360" value="0" step="5">
    </div>
    <div class="control-group">
      <label>对比度 <span class="value" id="v-n-contrast">50</span></label>
      <input type="range" id="n-contrast" min="10" max="90" value="50" step="5">
    </div>
    <div class="control-group">
      <label>种子 <span class="value" id="v-n-seed">42</span></label>
      <input type="range" id="n-seed" min="1" max="9999" value="42" step="1">
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="nebula-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="nebula-info"></div>
    <div class="btn-row">
      <button class="btn" id="nebula-download">下载 PNG</button>
      <button class="btn secondary" id="nebula-download-hd">下载 4K</button>
      <button class="btn secondary" id="nebula-randomize">随机</button>
    </div>
  </div>
</div>

<!-- ============ TOPOGRAPHIC GENERATOR ============ -->
<div class="generator" id="gen-topographic">
  <div class="controls">
    <div class="control-group">
      <label>配色</label>
      <select id="t-palette">
        <option value="swiss">瑞士</option>
        <option value="ocean">海洋</option>
        <option value="earth">大地</option>
        <option value="mono">单色</option>
      </select>
    </div>
    <div class="control-group">
      <label>等高线 <span class="value" id="v-t-contourCount">20</span></label>
      <input type="range" id="t-contourCount" min="5" max="50" value="20" step="1">
    </div>
    <div class="control-group">
      <label>比例 <span class="value" id="v-t-scale">3.0</span></label>
      <input type="range" id="t-scale" min="1.0" max="8.0" value="3.0" step="0.5">
    </div>
    <div class="control-group">
      <label>偏移 X <span class="value" id="v-t-offsetX">0</span></label>
      <input type="range" id="t-offsetX" min="-10" max="10" value="0" step="0.5">
    </div>
    <div class="control-group">
      <label>偏移 Y <span class="value" id="v-t-offsetY">0</span></label>
      <input type="range" id="t-offsetY" min="-10" max="10" value="0" step="0.5">
    </div>
    <div class="control-group">
      <label>八度 <span class="value" id="v-t-octaves">5</span></label>
      <input type="range" id="t-octaves" min="1" max="8" value="5" step="1">
    </div>
    <div class="control-group">
      <label>线宽 <span class="value" id="v-t-lineWidth">1.5</span></label>
      <input type="range" id="t-lineWidth" min="0.5" max="4.0" value="1.5" step="0.5">
    </div>
    <div class="control-group">
      <label>种子 <span class="value" id="v-t-seed">42</span></label>
      <input type="range" id="t-seed" min="1" max="9999" value="42" step="1">
    </div>
    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="t-fillBands" checked> 颜色填充
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="t-showLines" checked> 等高线
      </label>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="topographic-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="topographic-info"></div>
    <div class="btn-row">
      <button class="btn" id="topographic-download">下载 PNG</button>
      <button class="btn secondary" id="topographic-download-hd">下载 4K</button>
      <button class="btn secondary" id="topographic-randomize">随机</button>
    </div>
  </div>
</div>

<!-- ============ MOIRÉ PATTERN GENERATOR ============ -->
<div class="generator" id="gen-moire">
  <div class="controls">
    <div class="control-group">
      <label>图案</label>
      <select id="m-pattern">
        <option value="lines">线条</option>
        <option value="circles">圆环</option>
        <option value="dots">点阵</option>
        <option value="radial">放射</option>
      </select>
    </div>
    <div class="control-group">
      <label>混合模式</label>
      <select id="m-blendMode">
        <option value="multiply">正片叠底</option>
        <option value="screen">滤色</option>
        <option value="difference">差值</option>
      </select>
    </div>
    <div class="control-group">
      <label>频率 <span class="value" id="v-m-frequency">30</span></label>
      <input type="range" id="m-frequency" min="5" max="80" value="30" step="1">
    </div>
    <div class="control-group">
      <label>旋转 1 <span class="value" id="v-m-rotation1">0</span>&deg;</label>
      <input type="range" id="m-rotation1" min="0" max="180" value="0" step="0.5">
    </div>
    <div class="control-group">
      <label>旋转 2 <span class="value" id="v-m-rotation2">5</span>&deg;</label>
      <input type="range" id="m-rotation2" min="0" max="180" value="5" step="0.5">
    </div>
    <div class="control-group">
      <label>偏移 X <span class="value" id="v-m-offsetX">0</span></label>
      <input type="range" id="m-offsetX" min="-200" max="200" value="0" step="5">
    </div>
    <div class="control-group">
      <label>偏移 Y <span class="value" id="v-m-offsetY">0</span></label>
      <input type="range" id="m-offsetY" min="-200" max="200" value="0" step="5">
    </div>
    <div class="control-group">
      <label>振幅 <span class="value" id="v-m-amplitude">1.0</span></label>
      <input type="range" id="m-amplitude" min="0.2" max="1.0" value="1.0" step="0.05">
    </div>
    <div class="control-group">
      <label>图层 2 缩放 <span class="value" id="v-m-scale2">100</span>%</label>
      <input type="range" id="m-scale2" min="80" max="120" value="100" step="1">
    </div>
    <div class="control-group">
      <label>颜色 1
        <input type="color" id="m-color1" value="#ffffff">
      </label>
    </div>
    <div class="control-group">
      <label>颜色 2
        <input type="color" id="m-color2" value="#ffffff">
      </label>
    </div>
    <div class="control-group">
      <label>背景色
        <input type="color" id="m-bgColor" value="#000000">
      </label>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="moire-canvas" width="2048" height="2048"></canvas>
    </div>
    <div class="info-bar" id="moire-info"></div>
    <div class="btn-row">
      <button class="btn" id="moire-download">下载 PNG</button>
      <button class="btn secondary" id="moire-download-hd">下载 4K</button>
    </div>
  </div>
</div>

<script src="../waveform.js"></script>
